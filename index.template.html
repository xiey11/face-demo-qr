<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- 主跳转：meta refresh，服务器级别，不依赖 JS，弱网也稳定 -->
  <meta http-equiv="refresh" content="0; url=__TARGET_URL__">
  <title>AI 照片生成 — 跳转中</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      min-height:100vh;color:#fff;display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .card{
      background:rgba(255,255,255,.06);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;padding:48px 32px;text-align:center;max-width:380px;width:100%;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
    }
    .icon{font-size:56px;margin-bottom:20px}
    h1{font-size:22px;margin-bottom:8px;font-weight:600}
    .subtitle{font-size:14px;opacity:.7;margin-bottom:32px}
    .loader{
      width:48px;height:48px;margin:0 auto 24px;border:3px solid rgba(255,255,255,.1);
      border-top:3px solid #ff4081;border-radius:50%;animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    a.fallback{
      display:inline-block;margin-top:18px;padding:12px 28px;
      background:#ff4081;color:#fff;border-radius:24px;text-decoration:none;
      font-size:14px;font-weight:600;
    }
    .tip{font-size:12px;opacity:.5;margin-top:18px;line-height:1.6}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📸</div>
    <h1>AI 照片生成</h1>
    <div class="subtitle">正在跳转，请稍候...</div>
    <div class="loader"></div>
    <a class="fallback" href="__TARGET_URL__">如果未自动跳转，点这里</a>
    <div class="tip">推荐使用相机直接扫码<br/>避免使用微信扫一扫</div>
  </div>
  <script>
    // JS 兜底：如果 meta refresh 没生效，2 秒后强制跳
    setTimeout(function(){
      try { location.replace("__TARGET_URL__"); }
      catch(e) { location.href = "__TARGET_URL__"; }
    }, 1500);
  </script>
</body>
</html>
